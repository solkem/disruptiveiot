name: Deploy to Ghost

on:
  push:
    branches: [main]
    paths:
      - 'theme/**'
      - 'routes.yaml'
      - 'code-injection/**'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 143.110.131.196 >> ~/.ssh/known_hosts
      
      - name: Build theme
        run: |
          test -s theme/casper/assets/built/screen.css
          test -s theme/casper/assets/built/casper.js

      - name: Deploy theme
        run: rsync -avz --delete --exclude '.git' --exclude '.DS_Store' theme/casper/ root@143.110.131.196:/var/www/ghost/content/themes/casper/
      
      - name: Deploy routes
        run: scp routes.yaml root@143.110.131.196:/var/www/ghost/content/settings/routes.yaml
      
      - name: Prepare Ghost settings SQL
        run: |
          node << 'EOF'
          const fs = require('fs');

          function sqlString(value) {
            return "'" + value
              .replace(/\\/g, "\\\\")
              .replace(/'/g, "\\'")
              .replace(/\0/g, "\\0")
              .replace(/\n/g, "\\n")
              .replace(/\r/g, "\\r")
              .replace(/\x1a/g, "\\Z") + "'";
          }

          const head = fs.readFileSync('code-injection/site-header.html', 'utf8');
          const sql = [
            "UPDATE settings SET value='casper' WHERE `key`='active_theme';",
            `UPDATE settings SET value=${sqlString(head)} WHERE \`key\`='codeinjection_head';`,
            "UPDATE settings SET value='' WHERE `key`='codeinjection_foot';"
          ].join('\n') + '\n';

          fs.writeFileSync('/tmp/disruptiveiot-settings.sql', sql);
          EOF

      - name: Deploy Ghost settings
        run: |
          scp /tmp/disruptiveiot-settings.sql root@143.110.131.196:/tmp/disruptiveiot-settings.sql
          ssh root@143.110.131.196 << 'EOF'
          set -e
          cd /var/www/ghost
          DB_USER=$(node -e "console.log(require('./config.production.json').database.connection.user)")
          DB_PASSWORD=$(node -e "console.log(require('./config.production.json').database.connection.password || '')")
          DB_NAME=$(node -e "console.log(require('./config.production.json').database.connection.database)")
          if [ -n "$DB_PASSWORD" ]; then
            mysql -u "$DB_USER" -p"$DB_PASSWORD" "$DB_NAME" < /tmp/disruptiveiot-settings.sql
          else
            mysql -u "$DB_USER" "$DB_NAME" < /tmp/disruptiveiot-settings.sql
          fi
          EOF
      
      - name: Fix permissions and Restart Ghost
        run: ssh root@143.110.131.196 "chown -R ghost:ghost /var/www/ghost/content/themes/casper && cd /var/www/ghost && sudo -u ghost ghost restart"
